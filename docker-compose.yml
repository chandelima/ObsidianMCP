services:
  obsidian-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OBSIDIAN__REINDEXINTERVALMINUTES: "5"
    volumes:
      - ${OBSIDIAN_VAULT_HOST_PATH}:/vault:ro
      - ${OBSIDIAN_DATA_HOST_PATH}:/data
    restart: unless-stopped
